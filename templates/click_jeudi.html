<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click du Jeudi - NovaTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --accent-color: #FFD700; /* Or pour le côté exceptionnel du jeudi */
            --bg-dark: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg-dark); 
            color: white; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Effet de lumière en arrière-plan */
        .glow {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            z-index: -1;
        }

        .container {
            width: 90%; max-width: 400px;
            text-align: center;
            padding: 40px 20px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .icon-box {
            font-size: 50px;
            color: var(--accent-color);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        h1 { font-size: 26px; font-weight: 800; margin-bottom: 10px; }
        p { color: #94A3B8; font-size: 14px; margin-bottom: 30px; line-height: 1.6; }

        /* Le Bouton de Click */
        .click-area {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        .btn-main {
            width: 140px; height: 140px;
            background: var(--accent-color);
            border: none; border-radius: 50%;
            cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 900; color: #000; font-size: 18px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3), inset 0 -5px 10px rgba(0,0,0,0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 215, 0, 0.5); }
        .btn-main:active { transform: scale(0.92); }

        .btn-main i { font-size: 32px; margin-bottom: 5px; }

        /* Timer/Lock screen (Si avant 8h) */
        .lock-overlay {
            position: absolute; inset: 0; background: var(--bg-dark);
            border-radius: 35px; display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }

        .reward-info {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px;
            font-size: 13px; font-weight: 700; color: #CBD5E1;
        }

        .reward-info i { color: var(--accent-color); }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <div id="lock-screen" class="lock-overlay">
            <i class="fa fa-lock" style="font-size: 40px; color: #475569; margin-bottom: 15px;"></i>
            <h3 style="font-weight: 800;">Indisponible</h3>
            <p style="padding: 0 20px;">Revenez le <strong>Jeudi à partir de 08:00</strong> pour réclamer votre bonus.</p>
        </div>

        <div class="icon-box">
            <i class="fa fa-calendar-check"></i>
        </div>

        <h1>Bonus du Jeudi</h1>
        <p>Aujourd'hui est votre jour chanceux ! Cliquez sur le bouton pour recevoir vos points hebdomadaires.</p>

        <form action="{{ url_for('click_jeudi') }}" method="POST">
            <div class="click-area">
                <button type="submit" id="main-btn" class="btn-main">
                    <i class="fa fa-mouse-pointer"></i>
                    CLICK
                </button>
            </div>
        </form>

        <div class="reward-info">
            <i class="fa fa-coins"></i>
            <span>Valeur de la tâche : +20 Points</span>
        </div>
    </div>

    <script>
        function checkThursdayAccess() {
            const now = new Date();
            const day = now.getDay(); // 4 = Jeudi en JS
            const hour = now.getHours();

            const isThursday = (day === 4);
            const isTimeOk = (hour >= 8);

            // Si ce n'est pas le bon jour ou pas encore 8h
            if (!isThursday || !isTimeOk) {
                document.getElementById('lock-screen').style.display = 'flex';
            }
        }

        // Exécuter au chargement
        window.onload = checkThursdayAccess;
    </script>

</body>
</html>
