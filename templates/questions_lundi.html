<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz du Lundi - NovaTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #4F46E5;
            --bg-light: #F8FAFC;
            --text-main: #1E293B;
            --accent: #818CF8;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-light); color: var(--text-main); padding-bottom: 40px; }

        /* Header avec barre de progression */
        .quiz-header {
            background: white; padding: 20px; border-bottom: 1px solid #E2E8F0;
            position: sticky; top: 0; z-index: 100; text-align: center;
        }
        .quiz-header h1 { font-size: 18px; font-weight: 800; color: var(--primary); }
        
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }

        /* Carte de Question */
        .question-card {
            background: white; border-radius: 20px; padding: 25px;
            margin-bottom: 20px; border: 1px solid #E2E8F0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .q-number { 
            display: inline-block; padding: 4px 12px; background: #EEF2FF; 
            color: var(--primary); border-radius: 8px; font-size: 12px; 
            font-weight: 800; margin-bottom: 15px; 
        }
        .q-text { font-size: 16px; font-weight: 700; margin-bottom: 20px; line-height: 1.5; }

        /* Input de réponse */
        .answer-input {
            width: 100%; padding: 14px 20px; border-radius: 12px;
            border: 2px solid #E2E8F0; font-size: 14px; font-weight: 600;
            transition: all 0.3s; outline: none;
        }
        .answer-input:focus { border-color: var(--primary); background: #F5F3FF; }

        /* Bouton Valider */
        .btn-submit {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: var(--primary); color: white; font-size: 16px;
            font-weight: 800; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }
        .btn-submit:hover { transform: translateY(-2px); background: #4338CA; }
        .btn-submit:active { transform: scale(0.98); }

        /* Overlay de verrouillage (Lundi 8h) */
        .lock-overlay {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: none; flex-direction: column; align-items: center; 
            justify-content: center; text-align: center; padding: 30px;
        }
        .lock-overlay i { font-size: 60px; color: #CBD5E1; margin-bottom: 20px; }

        .points-info {
            background: #F0FDF4; color: #166534; padding: 15px;
            border-radius: 12px; margin-bottom: 25px; font-size: 13px;
            font-weight: 600; display: flex; align-items: center; gap: 10px;
        }
    </style>
</head>
<body>

    <div id="lock-screen" class="lock-overlay">
        <i class="fa fa-calendar-clock"></i>
        <h2 style="font-weight: 800;">Quiz Verrouillé</h2>
        <p style="color: #64748B; margin-top: 10px;">
            Le quiz hebdomadaire est disponible uniquement le <br>
            <strong>Lundi à partir de 08:00</strong>.
        </p>
        <a href="/" style="margin-top: 30px; color: var(--primary); font-weight: 700; text-decoration: none;">Retour au tableau de bord</a>
    </div>

    <div class="quiz-header">
        <h1><i class="fa fa-brain"></i> Quiz du Lundi</h1>
    </div>

    <div class="container">
        <div class="points-info">
            <i class="fa fa-info-circle"></i>
            <span>Chaque bonne réponse vous rapporte 5 points. Soyez précis !</span>
        </div>

        <form action="{{ url_for('questions_lundi') }}" method="POST">
            {% for q in questions %}
            <div class="question-card">
                <span class="q-number">Question {{ loop.index }}</span>
                <p class="q-text">{{ q.question_text }}</p>
                
                <input type="text" 
                       name="question_{{ q.id }}" 
                       class="answer-input" 
                       placeholder="Votre réponse ici..." 
                       required>
            </div>
            {% endfor %}

            <button type="submit" class="btn-submit">
                SOUMETTRE MES RÉPONSES
            </button>
        </form>
    </div>

    <script>
        function checkMondayAccess() {
            const now = new Date();
            const day = now.getDay(); // 1 = Lundi en JS
            const hour = now.getHours();

            const isMonday = (day === 1);
            const isTimeOk = (hour >= 8);

            // Si ce n'est pas Lundi OU s'il est moins de 8h
            if (!isMonday || !isTimeOk) {
                document.getElementById('lock-screen').style.display = 'flex';
            }
        }

        // Vérification immédiate
        window.onload = checkMondayAccess;
    </script>
</body>
</html>
