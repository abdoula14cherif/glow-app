<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Administration - NovaTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --admin-dark: #0F172A;
            --admin-accent: #6366F1;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--admin-dark); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* Arrière-plan décoratif subtil */
        .bg-glow {
            position: absolute; width: 300px; height: 300px;
            background: var(--admin-accent); filter: blur(120px);
            opacity: 0.15; border-radius: 50%; z-index: -1;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .login-card {
            width: 100%; max-width: 400px;
            padding: 40px; border-radius: 32px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .admin-icon {
            width: 70px; height: 70px; background: var(--admin-accent);
            color: white; border-radius: 20px; display: flex;
            align-items: center; justify-content: center;
            margin: 0 auto 25px; font-size: 30px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        h1 { font-size: 24px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.5px; }
        p { color: #94A3B8; font-size: 14px; margin-bottom: 35px; }

        /* Formulaire */
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-transform: uppercase; margin-left: 5px; }
        
        .input-box {
            position: relative; display: flex; align-items: center;
        }
        .input-box i { position: absolute; left: 18px; color: #64748B; font-size: 16px; }
        
        .form-control {
            width: 100%; background: #0F172A; border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 16px 16px 50px; border-radius: 16px; color: white;
            font-size: 15px; font-weight: 600; outline: none; transition: 0.3s;
        }
        .form-control:focus { border-color: var(--admin-accent); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .btn-login {
            width: 100%; background: var(--admin-accent); color: white;
            border: none; padding: 18px; border-radius: 16px;
            font-size: 16px; font-weight: 800; cursor: pointer;
            transition: 0.3s; margin-top: 15px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
        .btn-login:active { transform: translateY(0); }

        /* Alertes Flash */
        .alert {
            padding: 14px; border-radius: 12px; font-size: 13px; font-weight: 600;
            margin-bottom: 25px; text-align: center;
        }
        .alert-danger { background: rgba(239, 68, 68, 0.15); color: #F87171; border: 1px solid rgba(239, 68, 68, 0.2); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="login-card">
        <div class="admin-icon">
            <i class="fa fa-shield-halved"></i>
        </div>
        
        <h1>Accès Panel Admin</h1>
        <p>NovaTrade Finance Management</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">
                <i class="fa fa-triangle-exclamation"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_login') }}" method="POST">
            <div class="form-group">
                <label>Utilisateur</label>
                <div class="input-box">
                    <i class="fa fa-user-shield"></i>
                    <input type="text" name="username" class="form-control" placeholder="Nom d'utilisateur" required autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <label>Code d'accès</label>
                <div class="input-box">
                    <i class="fa fa-key"></i>
                    <input type="password" name="password" class="form-control" placeholder="Mot de passe" required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                SE CONNECTER AU PANEL
            </button>
        </form>

        <div style="margin-top: 30px;">
            <a href="/" style="color: #64748B; font-size: 12px; text-decoration: none; font-weight: 700;">
                <i class="fa fa-arrow-left"></i> Retour au site
            </a>
        </div>
    </div>

</body>
</html>
